openapi: 3.0.0
info:
  title: User Management API
  version: 1.0.0
  description: API for managing users, addresses, and posts
  contact:
    email: adelekegbolahan92@gmail.com
  

servers:
  - url: http://localhost:5000/api
    description: Local Development Server

paths:
  # 🟢 Users Endpoints
  /users:
    get:
      tags:
        - Users
      operationId: getUsers
      summary: Get all users
      description: Returns a paginated list of users
      parameters:
        - name: pageNumber
          in: query
          schema:
            type: integer
            default: 0
          description: Page number (default is 0)
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 10
          description: Number of users per page (default is 10)
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedUsers"
        "500":
          description: Internal Server Error

    post:
      tags:
        - Users
      operationId: createUser
      summary: Create a new user
      description: Creates a new user with the provided details
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserInput"
      responses:
        "201":
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: Invalid request data
        "500":
          description: Internal Server Error

  /users/count:
    get:
      tags:
        - Users
      operationId: getUserCount
      summary: Get total user count
      description: Returns the total number of users in the system
      responses:
        "200":
          description: Total user count
          content:
            application/json:
              schema:
                type: object
                properties:
                  totalCount:
                    type: integer
        "500":
          description: Internal Server Error

  /users/{id}:
    get:
      tags:
        - Users
      operationId: getUserById
      summary: Get user by ID
      description: Retrieves user details along with their address
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: User not found
        "500":
          description: Internal Server Error

  # 🏡 Address Endpoints
  /addresses/{userId}:
    get:
      tags:
        - Addresses
      operationId: getUserAddress
      summary: Get user address
      description: Retrieves the address associated with a user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Address found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Address"
        "404":
          description: Address not found
        "500":
          description: Internal Server Error

    patch:
      tags:
        - Addresses
      operationId: updateUserAddress
      summary: Update user address
      description: Modifies an existing address for a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddressInput"
      responses:
        "200":
          description: Address updated successfully
        "400":
          description: Invalid request data
        "404":
          description: Address not found
        "500":
          description: Internal Server Error

  /addresses:
    post:
      tags:
        - Addresses
      operationId: createUserAddress
      summary: Create user address
      description: Creates an address, ensuring each user has only one
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddressInput"
      responses:
        "201":
          description: Address created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Address"
        "400":
          description: Invalid request data
        "500":
          description: Internal Server Error

  # 📝 Posts Endpoints
  /posts:
    get:
      tags:
        - Posts
      operationId: getPosts
      summary: Get user posts
      description: Retrieves all posts for a specific user
      parameters:
        - name: userId
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Post"
        "400":
          description: Invalid query parameter
        "500":
          description: Internal Server Error

    post:
      tags:
        - Posts
      operationId: createPost
      summary: Create a new post
      description: Adds a new post for a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PostInput"
      responses:
        "201":
          description: Post created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"
        "400":
          description: Invalid request data
        "500":
          description: Internal Server Error

  /posts/{id}:
    delete:
      tags:
        - Posts
      operationId: deletePost
      summary: Delete a post by ID
      description: Removes a post from the system
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          message: "Post deleted successfully"
        "404":
          description: Post not found
        "500":
          description: Internal Server Error

# 📦 Components (Reusable Schemas)
components:
  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        address:
          $ref: "#/components/schemas/Address"

    UserInput:
      type: object
      required: [name, email]
      properties:
        name:
          type: string
        email:
          type: string

    PaginatedUsers:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/User"
        totalCount:
          type: integer
        totalPages:
          type: integer
        currentPage:
          type: integer

    Address:
      type: object
      properties:
        id:
          type: integer
        street:
          type: string
        city:
          type: string
        state:
          type: string
        zipCode:
          type: string
        userId:
          type: integer

    AddressInput:
      type: object
      required: [street, city, state, zipCode, userId]
      properties:
        street:
          type: string
        city:
          type: string
        state:
          type: string
        zipCode:
          type: string
        userId:
          type: integer

    Post:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        body:
          type: string
        userId:
          type: integer

    PostInput:
      type: object
      required: [title, body, userId]
      properties:
        title:
          type: string
        body:
          type: string
        userId:
          type: integer
